<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family:Arial; background:#f4f6fb; padding:20px; }
h2 { text-align:center; }

.card {
    background:white; padding:20px;
    margin:15px auto; width:300px;
    border-radius:12px; text-align:center;
}
button {
    width:100%; padding:10px;
    border:none; border-radius:8px;
    background:#667eea; color:white;
}
</style>
</head>

<body>

<h2>💸 Dashboard</h2>

<div class="card">
<h3>Group</h3>
<button onclick="location.href='group.html'">Create Group</button>
</div>

<div class="card">
<h3>Personal Expense</h3>
<button onclick="location.href='expense.html'">Add Expense</button>
</div>

<div class="card">
<h3>Split Expense</h3>
<button onclick="location.href='split.html'">Split</button>
</div>

</body>
</html>
