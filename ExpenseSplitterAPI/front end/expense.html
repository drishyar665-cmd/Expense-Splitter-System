<!DOCTYPE html>
<html>
<head>
<title>Expense</title>
<style>
body { font-family:Arial; background:#eef; display:flex; justify-content:center; align-items:center; height:100vh;}
.container { background:white; padding:30px; border-radius:12px; width:300px; text-align:center;}
input, button { width:100%; padding:10px; margin:10px 0; border-radius:8px;}
button { background:#28a745; color:white; border:none;}
</style>
</head>

<body>

<div class="container">
<h2>Add Expense</h2>

<input id="title" placeholder="Title">
<input id="amount" type="number" placeholder="Amount">

<button onclick="addExpense()">Add</button>
</div>

<script>
async function addExpense(){
    const token = localStorage.getItem("token");

    await fetch("https://localhost:5001/api/personalexpense",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body: JSON.stringify({
            title:title.value,
            amount:amount.value
        })
    });

    alert("Added!");
}
</script>

</body>
</html>
